            <div class="stage-switch" aria-label="演示阶段">
              <button class="is-active" data-stage="particle">阶段一：单个粒子运动</button>
              <button data-stage="scope">阶段二：波形形成与扫描</button>
            </div>
            <div class="view-buttons" aria-label="预设视角">
              <button data-view="side">侧视</button>
              <button data-view="top">俯视</button>
              <button data-view="screen">屏幕</button>
              <button data-view="iso">三维</button>
              <button id="scopeToggle" class="scope-toggle" aria-pressed="false">显示荧光屏窗口</button>
            </div>
          </div>
        </div>
        <div class="simulation-grid">
          <div id="scene" class="scene" aria-label="三维示波管仿真视图"></div>
          <section class="signal-panel" aria-label="输入信号与相图映射">
            <div class="signal-header">
              <h2>输入信号映射</h2>
              <span id="phasePointLabel">Ux: -- / Uy: --</span>
            </div>
            <div class="signal-plot">
              <div class="plot-title">
                <span>X / Y 通道输入</span>
                <span>t</span>
              </div>
              <canvas id="waveCanvas" width="560" height="230"></canvas>
            </div>
            <div class="signal-plot phase-plot">
              <div class="plot-title">
                <span>Uy - Ux 相图</span>
                <span>当前点 -> 屏幕坐标</span>
              </div>
              <canvas id="phaseCanvas" width="420" height="300"></canvas>
            </div>
          </section>
          <section class="scope-panel" aria-label="示波器荧光屏模拟窗口">
            <div class="scope-header">
              <div>
                <h2>示波器荧光屏</h2>
                <p>横向由 X 扫描电压控制，纵向由 Y 信号电压控制。</p>
              </div>
              <div class="scope-stats">
                <span id="scopeHitRate">--</span>
                <span id="scopeTimeWindow">--</span>
              </div>
            </div>
            <canvas id="scopeCanvas" width="960" height="420"></canvas>
          </section>
        </div>
      </section>

      <aside class="control-panel">
        <section class="control-group playback-group">
          <h2>播放</h2>
          <div class="button-row">
            <button id="playPause">暂停</button>
            <button id="restart">重放</button>
          </div>
          <label>
            粒子速度
            <input id="animationSpeed" type="range" min="0.2" max="3" value="1" step="0.1" />
          </label>
        </section>

        <section class="control-group constant-group">
          <h2>恒定偏转电压</h2>
          <label>
            X 恒定电压 Ux / V
            <input id="xConstant" type="range" min="-180" max="180" value="130" step="5" />
            <output id="xConstantValue">130</output>
          </label>
          <label>
            Y 恒定电压 Uy / V
            <input id="yConstant" type="range" min="-140" max="140" value="-80" step="5" />
            <output id="yConstantValue">-80</output>
          </label>
          <p class="stage-note">固定 Ux、Uy 后，一个电子只对应荧光屏上的一个亮点。</p>
        </section>

        <section class="control-group wave-group">
          <h2>波形输入</h2>
          <label>
            加速电压 Uacc / V
            <input id="uAcc" type="range" min="200" max="1600" value="800" step="20" />
            <output id="uAccValue">800</output>
          </label>
          <label>
            X 偏转电压波形
            <select id="xWaveform">
              <option value="sawtooth" selected>锯齿扫描</option>
              <option value="sine">正弦</option>
              <option value="triangle">三角</option>
              <option value="square">方波</option>
              <option value="dc">直流</option>
            </select>
          </label>
          <label>
            X 幅值 Ux / V
            <input id="xAmplitude" type="range" min="0" max="180" value="130" step="5" />
            <output id="xAmplitudeValue">130</output>
          </label>
          <label>
            X 频率 fx / Hz
            <input id="xFrequency" type="range" min="1" max="120" value="45" step="1" />
            <output id="xFrequencyValue">45</output>
          </label>
          <label>
            Y 偏转电压波形
            <select id="yWaveform">
              <option value="sine" selected>正弦</option>
              <option value="square">方波</option>
              <option value="triangle">三角</option>
              <option value="sawtooth">锯齿</option>
              <option value="dc">直流</option>
            </select>
          </label>
          <label>
            Y 幅值 Uy / V
            <input id="yAmplitude" type="range" min="0" max="140" value="80" step="5" />
            <output id="yAmplitudeValue">80</output>
          </label>
          <label>
            Y 频率 fy / Hz
            <input id="yFrequency" type="range" min="1" max="240" value="45" step="1" />
            <output id="yFrequencyValue">45</output>
          </label>
          <label>
            Y 相位 / °
            <input id="yPhase" type="range" min="-180" max="180" value="0" step="5" />
            <output id="yPhaseValue">0</output>
          </label>
          <p class="stage-note">连续电子在不同时刻受到 Ux(t)、Uy(t)，许多亮点叠加成波形。</p>
        </section>

        <section class="control-group geometry-group">
          <h2>几何参数</h2>
          <label>
            荧光屏距离 zscreen / m
            <input id="screenZ" type="range" min="0.16" max="0.32" value="0.22" step="0.01" />
            <output id="screenZValue">0.22</output>
          </label>
          <label>
            偏转区长度 / m
            <input id="deflectionLength" type="range" min="0.03" max="0.09" value="0.05" step="0.005" />
            <output id="deflectionLengthValue">0.05</output>
          </label>
          <label class="check-row">
            <input id="overlapFields" type="checkbox" checked />
            X/Y 偏转电场处在同一区域
          </label>
        </section>

        <section class="result-card">
          <h2>计算结果</h2>
          <dl>
            <div>
              <dt>屏幕落点 x</dt>
              <dd id="hitX">--</dd>
            </div>
            <div>
              <dt>屏幕落点 y</dt>
              <dd id="hitY">--</dd>
            </div>
            <div>
              <dt>飞行时间</dt>
              <dd id="flightTime">--</dd>
            </div>
            <div>
              <dt>状态</dt>
              <dd id="hitStatus">--</dd>
            </div>
            <div>
              <dt>当前 Ux / Uy</dt>
              <dd id="instantVoltage">--</dd>
            </div>
          </dl>
        </section>
      </aside>
    </main>
  </body>
</html>
